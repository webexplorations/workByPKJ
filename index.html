<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
<title>Work by PKJ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f0;--surface:#fff;--card:#fff;--border:rgba(0,0,0,.09);--border-med:rgba(0,0,0,.16);
  --accent:#4a6741;--accent-light:#e8f0e6;--text:#1a1a16;--muted:#6b6b60;
  --fs:16px;--fs-sm:14px;--fs-xs:12px;--fs-lg:20px;--fs-xl:28px
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:var(--fs);min-height:100vh;-webkit-user-select:none;user-select:none}
img{-webkit-user-drag:none;user-drag:none;pointer-events:none}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 20px 14px;text-align:center;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.logo{font-family:'Playfair Display',serif;font-size:var(--fs-xl);font-weight:600;color:var(--accent);margin-bottom:2px;letter-spacing:.5px}
.subtitle{font-size:var(--fs-xs);color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.stats-bar{display:flex;gap:8px;justify-content:center}
.stat{background:var(--accent-light);border-radius:20px;padding:5px 14px;text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:var(--fs);font-weight:600;color:var(--accent)}
.stat-label{font-size:var(--fs-xs);color:var(--muted);font-weight:600;margin-left:4px}
.controls{padding:14px 16px 0}
.search-wrap{position:relative;margin-bottom:10px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
input[type=text]{width:100%;background:var(--surface);border:1.5px solid var(--border-med);border-radius:12px;padding:11px 14px 11px 38px;color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:var(--fs);outline:none;transition:border-color .2s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
input[type=text]:focus{border-color:var(--accent)}
.tags-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-ms-overflow-style:none}
.tags-scroll::-webkit-scrollbar{display:none}
.tag-btn{flex-shrink:0;padding:7px 14px;background:var(--surface);border:1.5px solid var(--border-med);border-radius:20px;color:var(--muted);font-family:'Source Sans 3',sans-serif;font-size:var(--fs-sm);cursor:pointer;font-weight:600;transition:all .15s;white-space:nowrap}
.tag-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.result-count{padding:10px 18px 0;font-size:var(--fs-sm);color:var(--muted);font-style:italic}
.grid{padding:14px 12px 100px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.painting-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.painting-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.13);transform:translateY(-2px)}
.thumb-wrap{width:100%;aspect-ratio:1;overflow:hidden;background:#eee;position:relative}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.card-info{padding:9px 10px 10px}
.card-title{font-size:var(--fs-sm);font-weight:600;line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{font-size:var(--fs-xs);color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.mini-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--accent-light);color:var(--accent);font-weight:600}
.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);font-size:var(--fs);font-style:italic}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.modal-bg.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--surface);border-radius:20px;width:100%;max-width:560px;margin:auto;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal-img-wrap{width:100%;max-height:70vh;overflow:hidden;background:#111;position:relative;display:flex;align-items:center;justify-content:center}
.modal-img-wrap img{width:100%;height:auto;max-height:70vh;object-fit:contain;display:block}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.92);border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.2);font-weight:700}
.modal-close:hover{background:#fff}
.modal-body{padding:20px 22px 24px}
.modal-title{font-family:'Playfair Display',serif;font-size:var(--fs-xl);font-weight:600;line-height:1.3;margin-bottom:12px;color:var(--text)}
.modal-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.meta-item{background:var(--bg);border-radius:8px;padding:9px 12px;border:1px solid var(--border)}
.meta-label{font-size:var(--fs-xs);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;font-weight:600}
.meta-value{font-size:var(--fs-sm);font-weight:500}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.modal-tag{padding:4px 12px;border-radius:20px;background:var(--accent-light);color:var(--accent);font-size:var(--fs-sm);font-weight:600}
.modal-desc{font-size:var(--fs-sm);color:var(--muted);line-height:1.6;font-style:italic}
</style>
</head>
<body>
<header>
  <div class="logo">Work by PKJ</div>
  <div class="subtitle">A Painting Journal</div>
  <div class="stats-bar">
    <div class="stat"><span class="stat-num" id="totalCount">0</span><span class="stat-label">paintings</span></div>
    <div class="stat"><span class="stat-num" id="catCount">0</span><span class="stat-label">categories</span></div>
  </div>
</header>

<div id="app">
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">&#9906;</span>
      <input type="text" id="searchInput" placeholder="Search paintings…">
    </div>
    <div class="tags-scroll" id="tagFilters"></div>
  </div>
  <div class="result-count" id="resultCount"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <div class="modal-img-wrap" id="modalImgWrap">
      <button class="modal-close" id="modalClose">&#x2715;</button>
      <img id="modalImg" src="" alt="">
    </div>
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-tags" id="modalTags"></div>
      <div class="modal-desc" id="modalDesc"></div>
    </div>
  </div>
</div>

<script>
// Prevent right-click
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());

let paintings = [];
let activeTag = 'all';
let searchTerm = '';

// Category display names
const catNames = {
  'flowers': 'Flowers',
  'mankato': 'Mankato',
  'MemoryPlace': 'Memory Places',
  'wildlife': 'Wildlife',
  'Sibley': 'Sibley Park',
  'art-class': 'Art Class',
  'food': 'Food',
  'birch': 'Birch Trees',
  'highway169': 'Highway 169',
  'bird': 'Birds',
  'urban-sketching': 'Urban Sketching',
  'zen': 'Zen',
  'confluence': 'Confluence',
  'tree': 'Trees',
  'stilllife': 'Still Life',
  'coffeeHag': 'Coffee Hag',
  'poem': 'Poems',
  'landscape': 'Landscape',
  'lighthouse': 'Lighthouses',
  'portrait': 'Portraits',
  'rasmussenWoods': 'Rasmussen Woods',
  'bookmark': 'Bookmarks',
  'sakatah': 'Sakatah Trail',
  'courthouse': 'Courthouse',
  'door': 'Doors',
};

function tagLabel(tag) {
  return catNames[tag] || tag.charAt(0).toUpperCase() + tag.slice(1);
}

async function init() {
  const res = await fetch('paintings.json');
  paintings = await res.json();

  // Count tag occurrences
  const tagCounts = {};
  paintings.forEach(p => {
    p.tags.forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; });
  });

  // Build tag filter buttons — show tags with 3+ paintings
  const tagBar = document.getElementById('tagFilters');
  const btn = document.createElement('button');
  btn.className = 'tag-btn active';
  btn.dataset.tag = 'all';
  btn.textContent = 'All';
  tagBar.appendChild(btn);

  const sorted = Object.entries(tagCounts)
    .filter(([,c]) => c >= 3)
    .sort((a,b) => b[1] - a[1]);

  sorted.forEach(([tag, count]) => {
    const b = document.createElement('button');
    b.className = 'tag-btn';
    b.dataset.tag = tag;
    b.textContent = `${tagLabel(tag)} (${count})`;
    tagBar.appendChild(b);
  });

  // Unique categories count
  document.getElementById('catCount').textContent = sorted.length;
  document.getElementById('totalCount').textContent = paintings.length;

  tagBar.addEventListener('click', e => {
    const btn = e.target.closest('.tag-btn');
    if (!btn) return;
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTag = btn.dataset.tag;
    render();
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    searchTerm = e.target.value.toLowerCase();
    render();
  });

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalBg').addEventListener('click', e => {
    if (e.target === document.getElementById('modalBg')) closeModal();
  });

  render();
}

function render() {
  const filtered = paintings.filter(p => {
    if (activeTag !== 'all' && !p.tags.includes(activeTag)) return false;
    if (searchTerm) {
      const hay = `${p.title} ${p.medium} ${p.tags.join(' ')} ${p.description}`.toLowerCase();
      if (!hay.includes(searchTerm)) return false;
    }
    return true;
  });

  document.getElementById('resultCount').textContent =
    filtered.length === paintings.length
      ? `${paintings.length} paintings`
      : `${filtered.length} of ${paintings.length} paintings`;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">No paintings found</div>';
    return;
  }

  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'painting-card';
    const imgSrc = p.image ? `images/${p.image}` : '';
    const tagsHtml = p.tags.slice(0,3).map(t =>
      `<span class="mini-tag">${tagLabel(t)}</span>`
    ).join('');
    card.innerHTML = `
      <div class="thumb-wrap">
        ${imgSrc ? `<img src="${imgSrc}" alt="${p.title}" loading="lazy">` : '<div style="width:100%;height:100%;background:#ddd;display:flex;align-items:center;justify-content:center;color:#999;font-size:12px">No image</div>'}
      </div>
      <div class="card-info">
        <div class="card-title">${p.title}</div>
        <div class="card-meta">${p.date || ''}</div>
        <div class="card-tags">${tagsHtml}</div>
      </div>`;
    card.addEventListener('click', () => openModal(p));
    grid.appendChild(card);
  });
}

function openModal(p) {
  document.getElementById('modalImg').src = p.image ? `images/${p.image}` : '';
  document.getElementById('modalTitle').textContent = p.title;

  const metaItems = [];
  if (p.date) metaItems.push(['Date', p.date]);
  if (p.medium && p.medium !== 'null' && p.medium !== '') metaItems.push(['Medium', p.medium]);
  if (p.dimensions && p.dimensions !== 'null' && p.dimensions !== '') metaItems.push(['Size', p.dimensions]);

  document.getElementById('modalMeta').innerHTML = metaItems.map(([l,v]) =>
    `<div class="meta-item"><div class="meta-label">${l}</div><div class="meta-value">${v}</div></div>`
  ).join('');

  document.getElementById('modalTags').innerHTML = p.tags.map(t =>
    `<span class="modal-tag">${tagLabel(t)}</span>`
  ).join('');

  document.getElementById('modalDesc').textContent = p.description || '';
  document.getElementById('modalDesc').style.display = p.description ? '' : 'none';

  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('modalImg').src = '';
}

init();
</script>
</body>
</html>
